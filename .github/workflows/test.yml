name: test

on:
  workflow_dispatch:
  push:

jobs:
  cpp_ext_test:
    name: C++ Build + Python Regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ${{ github.workspace }}
      LAZYLLM_ENABLE_CPP_OVERRIDE: "1"
      LAZYLLM_EXPECTED_LOG_MODULES: "all"
      LAZYLLM_DEFAULT_LAUNCHER: "empty"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build and run C++ tests
        run: |
          pip install pybind11
          bash csrc/scripts/build_test.sh

      - name: Install test requirements
        run: |
          pip install -r tests/requirements.txt
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            pip install -r tests/requirements_linux.txt
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            pip install -r tests/requirements_mac.txt
          fi

      - name: Install C++ extension artifacts into workspace
        run: |
          cmake --install build --prefix . --component lazyllm_cpp
          ls -al lazyllm | grep -E "lazyllm_cpp|cpp_lib" || true

      - name: Compute pytest marker
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "PYTEST_MARKER=not skip_on_linux" >> "$GITHUB_ENV"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "PYTEST_MARKER=not skip_on_mac" >> "$GITHUB_ENV"
          else
            echo "PYTEST_MARKER=not skip_on_win" >> "$GITHUB_ENV"
          fi

      - name: Run basic tests
        run: |
          pytest -v --order-scope=class -m "$PYTEST_MARKER" tests/basic_tests

      - name: Run advanced tests
        run: |
          pytest -v --order-scope=class -m "$PYTEST_MARKER" tests/advanced_tests
