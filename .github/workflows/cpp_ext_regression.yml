name: Cpp Extension Regression (Temp)

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

env:
  PYTHON_VERSION: "3.10.9"

jobs:
  cpp_build_and_python_regression:
    name: C++ Build + Python Regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ${{ github.workspace }}
      LAZYLLM_ENABLE_CPP_OVERRIDE: "1"
      LAZYLLM_EXPECTED_LOG_MODULES: "all"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install test requirements
        run: |
          pip install -r tests/requirements.txt
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            pip install -r tests/requirements_linux.txt
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            pip install -r tests/requirements_mac.txt
          fi

      - name: Download test dataset
        run: |
          set -euo pipefail
          DATA_DIR="$GITHUB_WORKSPACE/.ci_data"
          rm -rf "$DATA_DIR"
          export GIT_TERMINAL_PROMPT=0
          if git clone --depth 1 https://github.com/LazyAGI/LazyLLM-Data.git "$DATA_DIR"; then
            echo "Cloned LazyLLM-Data anonymously."
          elif [[ -n "${DATA_REPO_TOKEN:-}" ]] && \
               git clone --depth 1 "https://x-access-token:${DATA_REPO_TOKEN}@github.com/LazyAGI/LazyLLM-Data.git" "$DATA_DIR"; then
            echo "Cloned LazyLLM-Data with token."
          else
            echo "Failed to clone LazyLLM-Data. If the repo is private, set LAZYLLM_DATA_REPO_TOKEN or PERSONAL_GITHUB_TOKEN."
            exit 1
          fi
          echo "LAZYLLM_DATA_PATH=$DATA_DIR" >> "$GITHUB_ENV"
        env:
          DATA_REPO_TOKEN: ${{ secrets.LAZYLLM_DATA_REPO_TOKEN || secrets.PERSONAL_GITHUB_TOKEN || github.token }}

      - name: Build and run C++ tests
        run: |
          pip install pybind11
          bash csrc/scripts/build_test.sh

      - name: Install C++ extension artifacts into workspace
        run: |
          cmake --install build --prefix . --component lazyllm_cpp
          ls -al lazyllm | rg "lazyllm_cpp|cpp_lib" || true

      - name: Run basic tests
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            MARKER="not skip_on_linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            MARKER="not skip_on_mac"
          else
            MARKER="not skip_on_win"
          fi
          pytest -v --reruns=2 --order-scope=class -m "$MARKER" tests/basic_tests

      - name: Run advanced tests (without key-required suites)
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            MARKER="not skip_on_linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            MARKER="not skip_on_mac"
          else
            MARKER="not skip_on_win"
          fi
          pytest -v --reruns=2 --order-scope=class -m "$MARKER" \
            tests/advanced_tests \
            --ignore=tests/advanced_tests/Deploy/test_deploy_full.py \
            --ignore=tests/advanced_tests/Tools/test_mongodb_manager.py
