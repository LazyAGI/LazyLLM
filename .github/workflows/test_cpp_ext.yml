name: TEST - RAG

on:
  push:
    branches:
      - yzh/fix_paddleocr
  workflow_dispatch:

jobs:
  rag_test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    env:
      PYTHON_VERSION: "3.10"
      LAZYLLM_DEFAULT_LAUNCHER: "empty"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install test requirements
        run: |
          pip install -r tests/requirements.txt
          pip install -r tests/requirements_linux.txt

      - name: Download test dataset (for BM25 diag)
        run: |
          set -euo pipefail
          DATA_DIR="$GITHUB_WORKSPACE/.ci_data"
          rm -rf "$DATA_DIR"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --depth 1 https://github.com/LazyAGI/LazyLLM-Data.git "$DATA_DIR"
          git config --global --unset url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf
          echo "LAZYLLM_DATA_PATH=$DATA_DIR" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}

      - name: BM25 diagnostic
        run: |
          echo "=== BM25 diagnostic ==="
          python -c "
          import lazyllm, os
          from lazyllm.tools.rag import Document, Retriever
          from lazyllm.tools.rag.transform import SentenceSplitter
          from lazyllm.tools.rag.doc_impl import DocImpl

          # Trace _list_local_files and _list_dataset_files
          _orig_local = DocImpl._list_local_files
          def traced_local(self):
              result = _orig_local(self)
              print(f'[_list_local_files] -> {len(result[0])} ids, {len(result[1])} paths')
              if result[1]:
                  print(f'  first: {result[1][0]}')
              return result
          DocImpl._list_local_files = traced_local

          _orig_ds = DocImpl._list_dataset_files
          def traced_ds(self):
              result = _orig_ds(self)
              print(f'[_list_dataset_files] dataset_path={self._dataset_path!r} -> {len(result)} files')
              return result
          DocImpl._list_dataset_files = traced_ds

          doc = Document(dataset_path='rag_master', manager=False)
          for kb_name, impl in doc._manager._iter_kbs().items():
              print(f'dataset_path={impl._dataset_path!r} doc_files={impl._doc_files!r}')
          doc.create_node_group(name='diag', transform=SentenceSplitter, chunk_size=128, chunk_overlap=10)
          doc.activate_groups('diag')
          print('Starting...')
          doc.start()
          print('Start done')
          for kb_name, impl in doc._manager._iter_kbs().items():
              print(f'Store type: {type(impl._store._impl).__name__}')
              for g in impl._store._activated_groups:
                  nodes = impl._store.get_nodes(group=g, kb_id=kb_name) if hasattr(impl._store, 'get_nodes') else []
                  print(f'  {g}: {len(nodes) if nodes else 0} nodes')
          r = Retriever(doc, group_name='diag', similarity='bm25', topk=3)
          result = r(query='天道')
          print(f'Results: {len(result)}')
          "

      - name: Run RAG tests
        run: |
          python -m pytest -v --tb=line --order-scope=class \
            -m "not skip_on_linux" tests/basic_tests/RAG \
            --ignore=tests/basic_tests/RAG/test_store.py \
            --ignore=tests/basic_tests/RAG/test_reader.py
