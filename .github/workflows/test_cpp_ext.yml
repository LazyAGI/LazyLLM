name: TEST - C++ Extension

on:
  push:
    branches:
      - yzh/fix_paddleocr
  workflow_dispatch:

jobs:
  cpp_ext_linux:
    name: C++ Build + RAG Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        ports:
          - 9201:9200
      opensearch:
        image: opensearchproject/opensearch:2.11.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
        ports:
          - 9200:9200
    defaults:
      run:
        shell: bash
    env:
      PYTHON_VERSION: "3.10"
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ${{ github.workspace }}
      LAZYLLM_ENABLE_CPP_OVERRIDE: "1"
      LAZYLLM_EXPECTED_LOG_MODULES: "all"
      LAZYLLM_DEFAULT_LAUNCHER: "empty"
      ELASTICSEARCH_HOST: localhost:9201
      OPENSEARCH_HOST: localhost:9200

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install test requirements
        run: |
          pip install -r tests/requirements.txt
          pip install -r tests/requirements_linux.txt

      - name: Download test dataset
        run: |
          set -euo pipefail
          DATA_DIR="$GITHUB_WORKSPACE/.ci_data"
          rm -rf "$DATA_DIR"
          export GIT_TERMINAL_PROMPT=0
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --depth 1 https://github.com/LazyAGI/LazyLLM-Data.git "$DATA_DIR"
          git config --global --unset url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf
          echo "LAZYLLM_DATA_PATH=$DATA_DIR" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}

      - name: Build and run C++ tests
        run: |
          pip install pybind11
          bash csrc/scripts/build_test.sh

      - name: Install C++ extension artifacts into workspace
        run: |
          cmake --install build --prefix . --component lazyllm_cpp
          ls -al lazyllm | grep -E "lazyllm_cpp|cpp_lib" || true

      - name: Run RAG tests
        run: |
          python -m pytest -v --order-scope=class -m "not skip_on_linux" tests/basic_tests/RAG

  cpp_ext_other:
    name: C++ Build + RAG Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    env:
      PYTHON_VERSION: "3.10"
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ${{ github.workspace }}
      LAZYLLM_ENABLE_CPP_OVERRIDE: "1"
      LAZYLLM_EXPECTED_LOG_MODULES: "all"
      LAZYLLM_DEFAULT_LAUNCHER: "empty"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install test requirements
        run: |
          pip install -r tests/requirements.txt
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            pip install -r tests/requirements_mac.txt
          fi

      - name: Download test dataset
        run: |
          set -euo pipefail
          DATA_DIR="$GITHUB_WORKSPACE/.ci_data"
          rm -rf "$DATA_DIR"
          export GIT_TERMINAL_PROMPT=0
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --depth 1 https://github.com/LazyAGI/LazyLLM-Data.git "$DATA_DIR"
          git config --global --unset url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf
          echo "LAZYLLM_DATA_PATH=$DATA_DIR" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}

      - name: Build and run C++ tests
        run: |
          pip install pybind11
          bash csrc/scripts/build_test.sh

      - name: Install C++ extension artifacts into workspace
        run: |
          cmake --install build --prefix . --component lazyllm_cpp
          ls -al lazyllm | grep -E "lazyllm_cpp|cpp_lib" || true

      - name: Compute pytest marker
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "PYTEST_MARKER=not skip_on_mac" >> "$GITHUB_ENV"
          else
            echo "PYTEST_MARKER=not skip_on_win" >> "$GITHUB_ENV"
          fi

      - name: Run RAG tests
        run: |
          python -m pytest -v --order-scope=class -m "$PYTEST_MARKER" tests/basic_tests/RAG
