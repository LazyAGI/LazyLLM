name: TEST - Build Doc Fix

on:
  push:
    branches:
      - yzh/fix_paddleocr
  workflow_dispatch:

jobs:
  test_build_doc:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Setup Python venv
        run: |
          VENV_DIR="~/GitHub/.venv/_test_doc_fix_${{ runner.name }}"
          rm -rf "$VENV_DIR"
          mkdir -p "$VENV_DIR"
          python -m venv --system-site-packages "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          echo "$VENV_DIR/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$VENV_DIR" >> $GITHUB_ENV
          echo "VENV_DIR=$VENV_DIR" >> $GITHUB_ENV

      - name: Build doc
        run: |
          set -e
          pip install -r requirements.txt
          pip install -r docs/requirements.txt
          echo "--- running doc build ---"
          LAZYLLM_INIT_DOC=True python -B -c "
          import sys
          sys.meta_path = [f for f in sys.meta_path if 'ScikitBuild' not in type(f).__module__]
          exec(open('docs/add_docstrings.py').read())
          "
          echo "SUCCESS"
